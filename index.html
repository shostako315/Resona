<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>おかねの相談室 | りそなグループ AIアドバイザー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;600&family=Shippori+Mincho:wght@400;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --green: #01894d; --green-dark: #005c35; --green-mid: #019a58; --green-lite: #dff2ea; --green-pale: #f0faf5;
      --orange: #e8680a; --orange-mid: #f07800; --orange-pale: #fff4e6; --orange-lite: #ffe4c0;
      --n900: #111; --n800: #222; --n700: #3a3a3a; --n400: #999; --n200: #e4e4e4; --n100: #f2f2f2; --n50: #f9f9f9;
      --white: #fff; --shadow-lg: 0 12px 48px rgba(0,0,0,.13);
      --r-md: 14px; --header-h: 60px; --sidebar-w: 288px; --info-w: 240px; --t: 0.2s cubic-bezier(0.4,0,0.2,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Noto Sans JP',sans-serif;background:var(--n50);color:var(--n900);height:100dvh;overflow:hidden;}

    /* ─── Loading & Login ─── */
    #ls, #loginModal { position: fixed; inset: 0; z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: opacity .6s ease; }
    #ls { background: var(--green-dark); }
    .ls-inner { text-align: center; color: white; }
    .ls-mark { width: 64px; height: 64px; background: linear-gradient(145deg, var(--orange) 0%, #c85500 100%); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin-bottom: 20px; box-shadow: 0 6px 28px rgba(232,104,10,.5); }
    .ls-bar { width: 160px; height: 2px; background: rgba(255,255,255,0.15); border-radius: 99px; overflow: hidden; margin-top: 20px; }
    .ls-fill { height: 100%; background: var(--orange); width: 0; animation: lbar 2s ease forwards; }
    @keyframes lbar { to { width: 100%; } }

    #loginModal { background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: none; }
    .login-card { background: white; padding: 40px; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; box-shadow: var(--shadow-lg); }
    .login-btn { width: 100%; padding: 14px; background: var(--green); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 20px; }

    /* ─── Layout ─── */
    #app { display: flex; flex-direction: column; height: 100dvh; opacity: 0; transition: 0.5s; }
    #app.visible { opacity: 1; }
    .hdr { height: var(--header-h); background: white; border-bottom: 1px solid var(--n200); display: flex; align-items: center; padding: 0 20px; gap: 15px; z-index: 100; }
    .hdr-logo { display: flex; align-items: center; gap: 10px; font-family: 'Shippori Mincho', serif; font-weight: 700; color: var(--green-dark); }
    .hdr-mark { width: 34px; height: 34px; background: var(--green); color: white; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    
    .wrap { display: flex; flex: 1; overflow: hidden; }

    /* ─── Sidebar ─── */
    .sb { width: var(--sidebar-w); background: white; border-right: 1px solid var(--n200); display: flex; flex-direction: column; overflow-y: auto; }
    .sb-section { padding: 20px 15px 10px; }
    .sb-label { font-size: 10px; font-weight: 700; color: var(--n400); letter-spacing: .1em; margin-bottom: 12px; }
    .up-zone { border: 2px dashed rgba(1,137,77,.25); border-radius: 14px; padding: 20px; text-align: center; cursor: pointer; background: var(--green-pale); position: relative; }
    .up-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .pc { background: linear-gradient(135deg, var(--green-dark), #003d20); border-radius: 14px; padding: 18px; color: white; margin: 15px; }
    .nav-item { padding: 12px 20px; display: flex; align-items: center; gap: 12px; font-size: 14px; color: var(--n700); cursor: pointer; border-left: 4px solid transparent; }
    .nav-item.active { background: var(--green-lite); color: var(--green-dark); border-left-color: var(--green); font-weight: 600; }

    /* ─── Chat ─── */
    .chat { flex: 1; display: flex; flex-direction: column; background: #f8faf9; }
    .chat-container { flex: 1; width: 100%; max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; background: white; box-shadow: 0 0 40px rgba(0,0,0,0.02); }
    #chatLog { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .msg { max-width: 85%; padding: 14px 20px; border-radius: 18px; font-size: 14px; }
    .msg.user { align-self: flex-end; background: var(--green); color: white; border-bottom-right-radius: 4px; }
    .msg.ai { align-self: flex-start; background: var(--n50); border: 1px solid var(--n200); border-bottom-left-radius: 4px; }
    .input-area { padding: 20px; border-top: 1px solid var(--n200); display: flex; gap: 12px; }
    .finp { flex: 1; padding: 14px; border: 1px solid var(--n200); border-radius: 12px; outline: none; }
    .send-btn { padding: 0 24px; background: var(--green); color: white; border-radius: 12px; font-weight: 600; }

    .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);z-index:10001;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;visibility:hidden;transition:0.3s;}
    .modal-ov.open{opacity:1;visibility:visible;}
    .modal{background:white;padding:28px;border-radius:24px;width:100%;max-width:440px;}

    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--n900);color:white;padding:10px 20px;border-radius:99px;opacity:0;transition:0.3s;z-index:11000;pointer-events:none;}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(-10px);}
  </style>
</head>
<body>

<div id="ls">
  <div class="ls-inner">
    <div class="ls-mark">🌿</div>
    <div style="font-size:24px; color:white; font-family:'Shippori Mincho',serif;">おかねの相談室</div>
    <div class="ls-bar"><div class="ls-fill"></div></div>
  </div>
</div>

<div id="loginModal">
  <div class="login-card">
    <div style="font-size: 44px; margin-bottom: 15px;">👤</div>
    <h3 style="font-family: 'Shippori Mincho', serif; margin-bottom: 10px;">田中 美咲 様</h3>
    <button class="login-btn" onclick="startApp()">ログインして相談を始める</button>
  </div>
</div>

<div id="app">
  <header class="hdr">
    <div class="hdr-logo"><div class="hdr-mark">🌿</div>おかねの相談室</div>
    <div class="hdr-context">
      <div class="hdr-ctx-main">AIアドバイザー接続中</div>
      <div class="hdr-ctx-sub">田中様の資産形成をサポートします</div>
    </div>
    <div class="hdr-right">
      <button onclick="openAdmin()" style="font-size:18px;">⚙️</button>
    </div>
  </header>

  <div class="wrap">
    <aside class="sb">
      <div class="sb-section">
        <div class="sb-label">データを読み込む</div>
        <div class="up-zone">
          <input type="file" id="fileInp" accept=".xlsx,.csv,.pdf" multiple onchange="updateFilePreview()">
          <div style="font-size:24px;">📂</div>
          <div style="font-size:12px; font-weight:600; color:var(--green-dark);">クリックしてアップロード</div>
        </div>
        <div id="fl" style="margin-top:10px; font-size:11px;"></div>
      </div>
      <div class="pc">
        <div class="pc-name">田中 美咲 様</div>
        <div style="font-size:10px; opacity:0.8;">現在の資産推計: ¥4,330,000</div>
      </div>
      <nav>
        <div class="nav-item active" onclick="quickAsk('家計診断をお願いします')">💬 AIに相談</div>
        <div class="nav-item" onclick="quickAsk('直近の支出を分析して')">📊 支出を分析</div>
      </nav>
    </aside>

    <main class="chat">
      <div class="chat-container">
        <div id="chatLog">
          <div class="msg ai">こんにちは、田中様。本日はどのようなお手伝いをしましょうか？</div>
        </div>
        <div class="input-area">
          <input type="text" id="userInput" class="finp" placeholder="メッセージを入力...">
          <button class="send-btn" onclick="handleSend()">送信</button>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="modal-ov" id="modalOv">
  <div class="modal">
    <h3>管理設定</h3>
    <input type="password" id="adminPw" class="finp" placeholder="パスワードを入力" style="margin:20px 0;">
    <button class="login-btn" onclick="checkPw()">認証</button>
  </div>
</div>

<div id="toast"></div>

<script>
  // ※ Difyの設定から取得したAPIキーを入力してください
  const API_KEY = 'app-lRGucRJhCbT0w8YijOoDLu8g'; 
  const BASE_URL = 'https://api.dify.ai/v1';
  let conversationId = '';

  // 起動時の挙動
  window.onload = () => {
    setTimeout(() => {
      document.getElementById('ls').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('ls').style.display = 'none';
        document.getElementById('loginModal').style.display = 'flex';
      }, 600);
    }, 2000);
  };

  function startApp() {
    document.getElementById('loginModal').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('loginModal').style.display = 'none';
      document.getElementById('app').classList.add('visible');
    }, 500);
  }

  function updateFilePreview() {
    const fl = document.getElementById('fl');
    const files = document.getElementById('fileInp').files;
    fl.innerHTML = Array.from(files).map(f => `<div>📄 ${f.name}</div>`).join('');
  }

  function appendMsg(text, role) {
    const log = document.getElementById('chatLog');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = text.replace(/\n/g, '<br>');
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  async function askAI(message) {
    appendMsg(message, 'user');
    const fileInp = document.getElementById('fileInp');
    let fileIds = [];

    try {
      if (fileInp.files.length > 0) {
        appendMsg('ファイルを解析中...', 'ai');
        for (const file of fileInp.files) {
          const formData = new FormData();
          formData.append('file', file);
          formData.append('user', 'sato-eigo-user');
          const res = await fetch(`${BASE_URL}/files/upload`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${API_KEY}` },
            body: formData
          });
          const data = await res.json();
          fileIds.push({ "type": "document", "transfer_method": "local_file", "upload_file_id": data.id });
        }
      }

      const response = await fetch(`${BASE_URL}/chat-messages`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          inputs: {}, query: message, response_mode: "blocking",
          user: "sato-eigo-user", conversation_id: conversationId, files: fileIds
        })
      });
      const data = await response.json();
      if (data.answer) {
        appendMsg(data.answer, 'ai');
        conversationId = data.conversation_id;
        fileInp.value = ''; document.getElementById('fl').innerHTML = '';
      }
    } catch (e) {
      appendMsg('接続エラーが発生しました。', 'ai');
    }
  }

  function handleSend() {
    const inp = document.getElementById('userInput');
    if (!inp.value.trim()) return;
    askAI(inp.value);
    inp.value = '';
  }

  function quickAsk(msg) { askAI(msg); }
  function openAdmin() { document.getElementById('modalOv').classList.add('open'); }
  function checkPw() { showToast('デモ版のため認証はスキップされます'); document.getElementById('modalOv').classList.remove('open'); }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  document.getElementById('userInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleSend();
  });
</script>
</body>
</html>
