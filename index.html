<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>おかねの相談室 | APIデモ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --green: #01894d; --green-lite: #dff2ea; --n100: #f2f2f2; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', sans-serif; background: #f4f7f5; height: 100dvh; display: flex; flex-direction: column; }
    
    header { height: 60px; background: white; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #ddd; justify-content: space-between; }
    .main-container { display: flex; flex: 1; overflow: hidden; }
    
    /* サイドバー */
    .sidebar { width: 260px; background: white; border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
    .nav-item { padding: 12px; background: #f9f9f9; border-radius: 8px; cursor: pointer; font-size: 14px; transition: 0.2s; border: 1px solid transparent; }
    .nav-item:hover { background: var(--green-lite); border-color: var(--green); }

    /* チャットエリア */
    .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; }
    #chatLog { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    
    /* 吹き出し */
    .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.6; }
    .msg.user { align-self: flex-end; background: var(--green); color: white; border-bottom-right-radius: 4px; }
    .msg.ai { align-self: flex-start; background: white; border: 1px solid #ddd; border-bottom-left-radius: 4px; }

    /* 入力欄 */
    .input-area { padding: 20px; background: white; border-top: 1px solid #ddd; display: flex; gap: 10px; }
    input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
    button#sendBtn { padding: 0 20px; background: var(--green); color: white; border: none; border-radius: 8px; cursor: pointer; }

    @media (max-width: 768px) { .sidebar { display: none; } }
  </style>
</head>
<body>

<header>
  <div style="font-weight: bold; color: var(--green);">🌿 おかねの相談室 API DEMO</div>
  <div style="font-size: 12px;">田中 美咲 様</div>
</header>

<div class="main-container">
  <aside class="sidebar">
    <div style="font-size: 11px; font-weight: bold; color: #999; margin-bottom: 5px;">ショートカット</div>
    <div class="nav-item" onclick="quickAsk('住宅ローンの借り入れ可能額をシミュレーションしたい')">🏠 ローン相談</div>
    <div class="nav-item" onclick="quickAsk('2024年の支出分析レポートを作成して')">📊 支出分析</div>
    <div class="nav-item" onclick="quickAsk('新NISAでの資産運用の始め方は？')">📈 資産運用</div>
  </aside>

  <main class="chat-area">
    <div id="chatLog">
      <div class="msg ai">こんにちは！田中様。本日はどのようなお手伝いをしましょうか？</div>
    </div>
    
    <div class="input-area">
      <input type="text" id="userInput" placeholder="メッセージを入力...">
      <button id="sendBtn" onclick="handleSend()">送信</button>
    </div>
  </main>
</div>

<script>
  const API_KEY = 'YOUR_DIFY_API_KEY'; // ここにAPIキーを入力
  const API_URL = 'https://api.dify.ai/v1/chat-messages';
  let conversationId = ''; // 会話を継続するためのID

  // メッセージを画面に表示
  function appendMsg(text, role) {
    const log = document.getElementById('chatLog');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerText = text;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  // API送信処理
  async function askAI(message) {
    appendMsg(message, 'user');
    
    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${API_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          inputs: {},
          query: message,
          response_mode: "blocking",
          user: "test-user-001",
          conversation_id: conversationId
        })
      });

      const data = await response.json();
      if (data.answer) {
        appendMsg(data.answer, 'ai');
        conversationId = data.conversation_id; // IDを保存して会話を繋げる
      }
    } catch (e) {
      appendMsg('エラーが発生しました。APIキーを確認してください。', 'ai');
    }
  }

  function handleSend() {
    const input = document.getElementById('userInput');
    if (!input.value) return;
    askAI(input.value);
    input.value = '';
  }

  function quickAsk(msg) {
    askAI(msg);
  }

  // Enterキーで送信
  document.getElementById('userInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleSend();
  });
</script>

</body>
</html>
